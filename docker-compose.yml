# Despliegue local de Flightlog (Gunicorn + SQLite + volúmenes).
# Uso: desde la raíz del repo — docker compose up --build
services:
  web:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "0"
      # Sustituir en entornos reales (mín. 50 caracteres recomendado por Django)
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-cambia-esta-clave-en-produccion-min-50-chars-xx}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000}"
      DJANGO_SQLITE_PATH: /app/data/db.sqlite3
      DJANGO_SERVE_MEDIA: "1"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-1}"
    volumes:
      - flightlog_data:/app/data
      - flightlog_media:/app/media

volumes:
  flightlog_data:
  flightlog_media:
