<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Flightlog{% endblock %}</title>
</head>
<body>
    <header>
        <p>
            {% if user.is_authenticated %}
            <a href="{% url 'logbook:dashboard' %}">Panel</a> ·
            <a href="{% url 'logbook:flight_list' %}">Vuelos</a> ·
            <a href="{% url 'logbook:flight_create' %}">Nuevo vuelo</a>
            · {{ user.username }}
            ·
            <form method="post" action="{% url 'users:logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Salir</button>
            </form>
            {% else %}
            <a href="{% url 'users:login' %}">Iniciar sesión</a> ·
            <a href="{% url 'users:register' %}">Registro</a>
            {% endif %}
        </p>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
