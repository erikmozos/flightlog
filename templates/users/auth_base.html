<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Flightlog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --auth-navy: #142642;
            --auth-navy-hover: #1a3254;
            --auth-text: #1f2937;
            --auth-muted: #6b7280;
            --auth-border: #e5e7eb;
            --auth-input-bg: #f3f4f6;
            --auth-link: #2563eb;
            --auth-link-hover: #1d4ed8;
            --auth-danger: #b91c1c;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body.auth-shell {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            font-size: 15px;
            color: var(--auth-text);
            background: radial-gradient(ellipse 120% 80% at 50% 40%, #fafbfc 0%, #eef2f7 55%, #e2e8f0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem 2.5rem;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.06), 0 12px 24px -8px rgba(15, 23, 42, 0.12);
            padding: 2.25rem 2rem 2rem;
        }
        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }
        .auth-brand svg { flex-shrink: 0; }
        .auth-brand-name {
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--auth-text);
            letter-spacing: -0.02em;
        }
        .auth-card h1 {
            margin: 0 0 0.4rem;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--auth-text);
        }
        .auth-subtitle {
            margin: 0 0 1.75rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--auth-muted);
            line-height: 1.45;
        }
        .auth-field { margin-bottom: 1.15rem; }
        .auth-field label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--auth-text);
            margin-bottom: 0.4rem;
        }
        .auth-label-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.4rem;
        }
        .auth-label-row label { margin-bottom: 0; }
        .auth-link {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--auth-link);
            text-decoration: none;
        }
        .auth-link:hover { color: var(--auth-link-hover); text-decoration: underline; }
        .auth-input-shell {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            background: var(--auth-input-bg);
            border: 1px solid var(--auth-border);
            border-radius: 10px;
            padding: 0 0.85rem;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .auth-input-shell:focus-within {
            border-color: #94a3b8;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        .auth-input-shell .auth-input-icon { flex-shrink: 0; color: var(--auth-muted); }
        .auth-input-shell input.auth-input-field {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            padding: 0.75rem 0;
            font: inherit;
            color: var(--auth-text);
        }
        .auth-input-shell input.auth-input-field::placeholder { color: #9ca3af; }
        .auth-input-shell input.auth-input-field:focus { outline: none; }
        .auth-toggle-pass {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--auth-muted);
            border-radius: 6px;
        }
        .auth-toggle-pass:hover { color: var(--auth-text); background: rgba(0,0,0,0.04); }
        .auth-errorlist {
            margin: 0.35rem 0 0;
            padding-left: 1rem;
            font-size: 0.8125rem;
            color: var(--auth-danger);
        }
        .auth-nonfield {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 0.65rem 0.85rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: var(--auth-danger);
        }
        .auth-btn-primary {
            display: block;
            width: 100%;
            margin-top: 0.25rem;
            padding: 0.85rem 1rem;
            border: none;
            border-radius: 10px;
            background: var(--auth-navy);
            color: #fff;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .auth-btn-primary:hover { background: var(--auth-navy-hover); }
        .auth-footer-line {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--auth-muted);
        }
        .auth-footer-line a {
            font-weight: 600;
            color: var(--auth-text);
            text-decoration: none;
        }
        .auth-footer-line a:hover { text-decoration: underline; }
        .auth-tagline {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #9ca3af;
            max-width: 24rem;
            line-height: 1.5;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="auth-shell">
    {% block content %}{% endblock %}
    {% block tagline %}
    <p class="auth-tagline">Precisión aeronáutica en cada registro</p>
    {% endblock %}
</body>
</html>
